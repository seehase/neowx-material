#  +-------------------------------------------------------------------------+
#  |                                                                         |
#  |                N E O W X    M A T E R I A L    S K I N                  |
#  |                                                                         |
#  |                 C O N F I G U R A T I O N     F I L E                   |
#  |                                                                         |
#  +-------------------------------------------------------------------------+
#
# Skin specific configuration
# -----------------------------------------------------------------------------
#
# Dear user: This is probably the only section you need to edit
#
[Extras]
    # Version
    # -------------------------------------------------------------------------
    #
    # This is the current version of this skin.
    # You can check for updates on the project page.

    version = 1.62.2

    # Language
    # -------------------------------------------------------------------------
    #
    # The language of this skin is definde in weewx.conf file
    #
    # Translations
    # Change language specific text in the language file
    # /lang/<country>.conf in the section [Texts]
    #
    # Available language: ca, de, da, en, es, fi, fr, it, nl, pl, se, sk

    # Color of your skin
    # -------------------------------------------------------------------------
    #
    # This will change the primary color of your skin. The chart colors
    # can be changed in the [[Charts]] section below.
    #
    # Available: red,         pink,        purple,       deep-purple,
    #            indigo,      blue,        light-blue,   cyan,
    #            teal,        green,       light-green,  lime,
    #            yellow,      amber,       orange,       deep-orange,
    #            brown,       grey,        blue-grey
    #
    color = indigo

    # Theme colors for manifest file and background color for the manifest.json
    # -------------------------------------------------------------------------
    # This is list of all available theme colors
    # Based on color set above the correct hex code will be set automatically into manifest.json
    #
    [[Manifest]]
        background_color = "#f5f5f5" # light theme background color is same for all themes in manifest.json
        red = "#f44336"
        pink = "#e91e63"
        purple = "#9c27b0"
        deep-purple = "#673ab7"
        indigo = "#3f51b5"
        blue = "#2196f3"
        light-blue = "#03a9f4"
        cyan = "#00bcd4"
        teal = "#009688"
        green = "#4caf50"
        light-green = "#8bc34a"
        lime = "#cddc39"
        yellow = "#ffeb3b"
        amber = "#ffc107"
        orange = "#ff9800"
        deep-orange = "#ff5722"
        brown = "#795548"
        grey = "#9e9e9e"
        blue-grey = "#607d8b"

    # Header
    # -------------------------------------------------------------------------
    #
    # This section contains config for the global HTML <head> area
    # but also for the page header.
    #
    [[Header]]
        # Meta tags in <head> of each page
        description =
        keywords = weather,weewx,neowx-material

        # Show these pages in the navigation menu? yes/no
        current_nav_link = yes
        yesterday_nav_link = yes
        week_nav_link = yes
        month_nav_link = yes
        year_nav_link = yes
        archive_nav_link = yes

        # You can add up to 2 more links at the end of the navigation menu
        # Empty URLs will be hidden
        custom1_label =
        custom1_url =

        custom2_label =
        custom2_url =

        # Show almanac in header? yes/no
        # If pyephem is available: sun + moon rise/set, more button
        # If pyephem is not available: sunrise + sunset
        show_almanac = yes

        # Show almanac as link in the navigation menu? yes/no
        # (if almanac is shown in header it contains a more button)
        almanac_nav_link = no

        # Show logo in header? yes/no
        show_logo = yes

        # If you don't like the logo you can specify the URL to your own
        custom_logo_url =

        # Enable Google Tag Manager support, use either GA or GTM not both at the same time
        google_tagmanager_enable = no
        google_tagmanager_id =

        # Enable Google Analytics support, use either GA or GTM not both at the same time
        google_analytics_enable = no
        google_analytics_id =

        # enable or disable auto refresh and define number seconds after page will be reloaded
        auto_refresh_enable = yes
        auto_refresh_seconds = 300

        # Show online/offline state if last update datetime > x minutes
        # set offline_threshold_minutes to 0 to disable feature
        offline_threshold_minutes = 15

    # Footer
    # -------------------------------------------------------------------------
    #
    # Empty fields / links will be hidden.
    #
    [[Footer]]
        # Your name to appear in the copyright line
        name = My weather station

        # Show hardware + altitude
        show_about_data = yes

        # Additional text content below about section of footer
        about =

        # Show link to telemetry page in about section of the footer? yes/no
        show_telemetry = yes

        # Show uptime of station + server in about section of the footer? yes/no
        show_uptime = yes

        # Text content for a custom text box in the middle of the footer
        box_title =
        box_content =

        # Up to 4 custom links in the right part of the footer
        # if you want a specific location use with latitude and longitude with 3 digits after comma and zoom 2 to 15
        # https://lmaps.org/#<lon>;<lat>;<zoom>
        # e.g. https://lmaps.org/#-1.826;51.178;9
        link1_label = Lightning Maps
        link1_url = https://www.lightningmaps.org

        # if you want a specific location use with latitude and longitude with 3 digits after comma
        # https://www.windy.com/<lat>/<lon>
        # e.g. https://www.windy.com/51.178/-1.826
        link2_label = Windy
        link2_url = https://www.windy.com

        link3_label =
        link3_url =

        link4_label =
        link4_url =

        # Links to imprint / privacy pages
        # These links will appear on the row below the footer
        imprint_label =
        imprint_url =

        privacy_label =
        privacy_url =

        # Do you want to support weewx and this skin by showing
        # small credits in the last footer line? yes/no
        # By default this displays:
        # "Powered by weewx vX.X.X" and "NeoWX Material skin vX.X"
        # With the current version of weewx and this skin (if enabled).
        # The names are also clickable and will redirect to the project
        # pages, but with "noopener" to increase privacy.
        # We thank you for your support.
        support_weewx = yes
        support_skin = yes
        show_version = yes

        # Update check modes:
        # Internet connection is requiered for this feature
        # off - No update checking performed
        # minor - Only show notifications for minor version updates (e.g., 1.50.x -> 1.51.x)
        # patch - Show notifications for all version updates including patches (e.g., 1.51.1 -> 1.51.2)
        update_check = minor

        # Update check interval in minutes (default: 1440 minutes = 24 hours = 1 day)
        update_interval = 1440

        # URL to check for the latest version (usually no need to change this)
        update_check_url = https://raw.githubusercontent.com/seehase/neowx-material/master/skins/neowx-material/skin.conf

    # OnlineCheck
    # -------------------------------------------------------------------------
    #
    [[OnlineCheck]]
        # URL to check for connectivity. Default: http://www.google.com
        check_url = http://www.google.com

        # Timeout for the check in seconds. Default: 10
        timeout = 10

        # Interval for the check in minutes. Default: 3
        interval = 3

        # Always show online status icon. Default: false
        always_show_status = false

    # Date and time formatting
    # -------------------------------------------------------------------------
    #
    [[Formatting]]
        # --- Header date / time (used in header.inc + MQTT live updates) ---
        # date  : shown on row 1 below the station name  (e.g. 17.05.2026)
        # time  : shown on row 2 below the station name  (e.g. 13:29:03)
        date = %d.%m.%Y
        time = %H:%M:%S

        # --- Combined formats used by other pages / charts ---
        # datetime_today : time-of-day for today's min/max (telemetry, yesterday)
        datetime_today = %H:%M
        # datetime       : date + time for multi-day pages (week, month)
        datetime = %a %d %H:%M
        # datetime_archive : compact date for archive pages
        datetime_archive = %d.%m. %H:%M

        # Datetime format (javascript) for charts
        # DD = day of month (01..31)
        # MM = month (01..12)
        # HH = 24-hour hour (00..23)
        # mm = minutes (00..59) <-- lowercase mm is required
        # dd / ddd / dddd = weekday (different lengths for different names)
        # The base datetime_graph_label / _tooltip are the fallback; each page
        # can override with a _<page> suffix (day / week / month / year /
        # telemetry). Telemetry spans Telemetry.chart_days (30 by default), so a
        # date-only label like DD.MM reads better than a time there.
        datetime_graph_label = dd HH:mm
        datetime_graph_label_day = dd HH:mm
        datetime_graph_label_week = ddd
        datetime_graph_label_month = DD
        datetime_graph_label_year = DD.MM
        datetime_graph_label_telemetry = DD.MM
        datetime_graph_tooltip = dd DD. MMM YY HH:mm
        datetime_graph_tooltip_day   = dd DD. MMM YY HH:mm
        datetime_graph_tooltip_week  = dd DD. MMM YY HH:mm
        datetime_graph_tooltip_month = dd DD. MMM YY HH:mm
        datetime_graph_tooltip_year  = dd DD. MMM YY HH:mm
        datetime_graph_tooltip_telemetry = dd DD. MMM YY HH:mm

        # -----------------------------------------------------------------------
        # v2 date-formatting reference
        # -----------------------------------------------------------------------
        #
        # NAMED CUSTOM FORMATS
        # Define any number of named formats here; reference them by name in the
        # per-chart and per-page keys below.
        #
        #   datetime_custom_graph_* = moment.js tokens (charts)
        #     e.g.  datetime_custom_graph_dayonly = ddd DD
        #           datetime_custom_graph_full    = ddd DD.MM.YYYY HH:mm
        #           datetime_custom_graph_month   = MMM
        #
        #   datetime_custom_card_*  = Python strftime (cards)
        #     e.g.  datetime_custom_card_short = %H:%M
        #           datetime_custom_card_full  = %a %d.%m.%Y %H:%M
        #
        # Keep the prefixes straight: moment strings in _graph_, strftime in _card_.
        #
        # -----------------------------------------------------------------------
        #
        # PER-PAGE CHART LABEL & TOOLTIP
        # The keys already defined above select automatically by page ($page):
        #
        #   x-axis label  : datetime_graph_label_day (index + yesterday)
        #                   datetime_graph_label_week  / _month  / _year
        #   hover tooltip : datetime_graph_tooltip_day (index + yesterday)
        #                   datetime_graph_tooltip_week / _month / _year
        #
        # index and yesterday share the "day" scope ($page = day). The base
        # (non-suffixed) datetime_graph_label / _tooltip are the fallback and
        # are used by the telemetry charts. Edit these keys directly to change
        # the site-wide baseline. Each value can be a literal moment string (e.g.
        # ddd DD) or a datetime_custom_graph_* named constant.
        #
        # -----------------------------------------------------------------------
        #
        # PER-CUSTOM-CHART OVERRIDE
        # On any customChart* block in [[Appearance]], add:
        #
        #   datetime_label_format   = datetime_custom_graph_<name>   # x-axis
        #   datetime_tooltip_format = datetime_custom_graph_<name>   # tooltip
        #   tick_style             = auto | fixed:N | align | align:N
        #
        # datetime_label_format / datetime_tooltip_format set the date format.
        # The value can be a named constant (above) OR a literal moment string,
        # e.g. datetime_label_format = dd DD. Use a named constant when you reuse
        # the same format on several charts; a literal is fine for a one-off.
        #
        # tick_style sets how many x-axis labels this chart shows and how they
        # line up - exactly the same choices as the page-level tick_style in
        # [[Charts]] (auto / fixed:N / align / align:N, all described there). It
        # overrides the page setting for this one chart; leave it out and the
        # chart simply follows whatever the page uses.
        #
        # These can be placed at chart level (applies on every page) or inside a
        # per-page sub-section to target just one page:
        #
        #   [[[customChartOutTemp]]]
        #       datetime_label_format = datetime_custom_graph_dayonly   # all pages
        #       [[[[week]]]]
        #           datetime_label_format = datetime_custom_graph_full  # week only
        #
        # Per-page sub-sections (these use the chart per-page config scope -
        # the index page is "current" here): [[[[current]]]], [[[[yesterday]]]],
        # [[[[week]]]], [[[[month]]]], [[[[year]]]]
        #
        # Priority: per-chart override > per-page keyed default > global default.
        #
        # -----------------------------------------------------------------------
        #
        # PER-PAGE CARD TIMES  (CardPageFormats)
        # Controls the "high 24.3° at 14:32" time shown on value cards.
        # A value is a datetime_custom_card_* (strftime) named constant OR a
        # literal strftime string, e.g. day = %a %d.%m.%Y %H:%M.
        #
        # Scopes: day (index + yesterday), week, month, year, telemetry.
        # [[[CardPageFormats]]]
        #     day       = datetime_custom_card_short
        #     week      = datetime_custom_card_full
        #     month     = datetime_custom_card_full
        #     year      = datetime_custom_card_full
        #     telemetry = datetime_custom_card_short
        #
        # Valid scopes: index, yesterday, week, month, year, telemetry.
        # When no CardPageFormats entry applies, cards fall back to:
        #   datetime_today    (index, yesterday, telemetry)
        #   datetime          (week, month)
        #   datetime_archive  (year)
        #
        # -----------------------------------------------------------------------
        #
        # MQTT "LAST UPDATED" TIMESTAMP  (datetime_updated)
        # The header's live "last updated" time (refreshed via MQTT) normally uses
        # the datetime key above.  Set datetime_updated to give it its own format.
        # Falls back to datetime when unset, so existing setups are unaffected.
        #
        #   datetime_updated = %a %d %H:%M
        #
        # Note: %-d / %-H (GNU strftime zero-strip) do NOT work in MQTT live
        # renders; use the padded tokens (%d, %H) in datetime_updated.
        # -----------------------------------------------------------------------


    # Appearance
    # -------------------------------------------------------------------------
    #
    # Here you can change the order of all cards and their appearance.
    # You can also remove values to hide them.
    # Note: Cards and charts without data won't be shown.
    #
    [[Appearance]]
        # Enable hover effect on cards (default: true)
        # Set to false to disable hover effects on value and chart cards
        enable_hover_effect = true

        # Collapsible expansion panels (default: true)
        # -------------------------------------------------------------------------
        # When enabled, you can insert special panel-separator markers inside
        # values_order and charts_order.  Everything that follows a marker is
        # grouped into a collapsible Material-Design expansion panel until the
        # next marker is encountered.  Items before the first marker are always
        # shown without a panel wrapper.
        #
        # Marker syntax (add to values_order / charts_order like any other item):
        #   hr            – starts an EXPANDED panel (no title)
        #   hr:My Title   – starts an EXPANDED panel with title "My Title"
        #   hrc           – starts a COLLAPSED panel (no title)
        #   hrc:My Title  – starts a COLLAPSED panel with title "My Title"
        #
        # Example:
        #   values_order = outTemp, hr:Indoor, inTemp, hrc:Soil Sensors, soilMoist1
        #   → outTemp shown normally
        #   → inTemp inside an expanded panel labelled "Indoor"
        #   → soilMoist1 inside a collapsed panel labelled "Soil Sensors"
        #
        enablePanels = true

        # Color of the panel header background and title text.
        # Leave empty to use the default inherited color.
        # Accepts any valid CSS color value, e.g.: #3f51b5, indigo, rgb(63,81,181)
        # Two pairs of colors can be defined: one for light mode and one for dark mode.
        # Example:
        #   panelColor      = "#eaeaea"   (light mode background)
        #   panelColorDark  = "#bbbbbb"   (dark mode background)
        #   panelTitleColor     = "#3F51B5"   (light mode title)
        #   panelTitleColorDark = "#3F51B5"   (dark mode title)
        panelColor = "#eaeaea"
        panelColorDark = "#333333"
        panelTitleColor = "#3F51B5"
        panelTitleColorDark = "#3F51B5"

        # The order of values cards (left column)
        # For enabling forecast, add "forecast" without quotes to the list
        values_order = soilMoist1, soilMoist2, soilMoist3, soilMoist4,soilMoist5, soilMoist6, outTemp, outHumidity, barometer, forecast, altimeter, pressure, windSpeed, windrun, rain, snowDepth, dewpoint, windchill, heatindex, inTemp, inHumidity, UV, ET, radiation, appTemp, cloudbase, lightning_noise_count, lightning_disturber_count, lightning_distance, lightning_energy, pm2_5, co2, temperatureThresholdDays, hrc:External Sensors, extraTemp1, extraHumid1, extraTemp2, extraHumid2, extraTemp3, extraHumid3, extraTemp4, extraHumid4, extraTemp5, extraHumid5, extraTemp6, extraHumid6, extraTemp7, extraHumid7, extraTemp8, extraHumid8, soilMoist1, soilMoist2, soilMoist3, soilMoist4, soilMoist5, soilMoist6, soilMoist7, soilMoist8, soilTemp1, soilTemp2, soilTemp3, soilTemp4, soilTemp5, soilTemp6, soilTemp7, soilTemp8, lightning_strike_count

        # The order of chart cards (right column)
        charts_order = inTemp, outTemp, hr:Custom Charts, customChartOutTemp, customChartInTemp, customChartTemp, windchill, customChartBarometer, hr:Additional Charts, rain, snowDepth, windSpeed, windrun, windDir, windvec, UV, ET, radiation, outHumidity, inTemp, inHumidity,  cloudbase, hrc:External Sensor Charts, extraTemp1, extraHumid1, extraTemp2, extraHumid2, extraTemp3, extraHumid3, extraTemp4, extraHumid4, extraTemp5, extraHumid5, extraTemp6, extraHumid6, extraTemp7, extraHumid7, extraTemp8, extraHumid8, soilMoist1, soilTemp1, lightning_strike_count, hr:Other Charts, appTemp, lightning_noise_count, lightning_disturber_count, lightning_distance, lightning_energy, pm2_5, co2

        # For enabling embedded iframes or images add their names to the list below
        # The names must match the ones defined in the [[Embedded]] section below
        # Names are case sensitive, and must start with iFrame or image and must be unique
        # embedded_order = iFrame1, iFrame2, iFrameAnything, image1, image2, imageAnything
        embedded_order =

        # The order of cards on telemetry page
        telemetry_order = rxCheckPercent, txBatteryStatus, windBatteryStatus, rainBatteryStatus, outTempBatteryStatus, inTempBatteryStatus, consBatteryVoltage, heatingVoltage, supplyVoltage, referenceVoltage, extraBattery1, extraBattery2, extraBattery3, extraBattery4, extraBattery5, extraBattery6, extraBattery7, extraBattery8
        telemetry_chart_order = outTempBatteryStatus, inTempBatteryStatus, consBatteryVoltage, supplyVoltage, referenceVoltage

        # Show trend arrow with tooltip at these values on the "current" page
        show_trend_on = barometer, outTemp, outHumidity, inTemp, inHumidity, UV, co2, pm2_5, ET

        # Should the coordinates (latitude, longitude) be shown in the
        # NOAA TXT reports? yes/no
        show_coordinates = yes

        # Light / Dark mode
        # By default the theme is set based on the user's device settings.
        # You can manually force to only display the light or dark mode.
        # Values: auto / light / dark
        mode = auto

        # Here you can set a hex code for the text color of low / high values
        # on all cards. By default they are grey. (quotes are needed on values and #)
        # lo_value_color = "#03a9f4"
        # hi_value_color = "#f44336"
        lo_value_color =
        hi_value_color =

        # allowMouseWheelZoom in charts true/false, default is no if enabled, it can have impact during scrolling the page
        allowMouseWheelZoom = false

        # define if charts should have a zoom or pan by default, zoom/pan, default is zoom
        defaultChartBehavior = zoom

        # Custom charts
        # -------------------------------------------------------------------------
        # Define your own charts with any name starting with "customChart".
        # Add the name to charts_order above to display the chart.
        # Names are case-sensitive and must be unique (e.g. customChart1, customChartMyTemp).
        #
        # Available charttype values: area, bar, line
        # Available column values:    avg, min, max, sum, vecdir
        #   column can be a single value OR a comma-separated list of values.
        #   When multiple columns are given, each field is plotted once per column.
        #   Series labelled "<obs label> <column label>" when more than one column
        #   is used for a field; otherwise just "<obs label>".
        # values: comma-separated list of WeeWX field names
        #
        # Per-page overrides
        # -------------------------------------------------------------------------
        # By default the top-level "values" and "column" apply to every page.
        # Add an optional subsection named after the page to override per page.
        # Supported page keys: current, yesterday, week, month, year
        #
        # Inside a page subsection you can use:
        #   column = avg              – same column(s) for all fields on this page
        #   values = fieldA, fieldB   – override which fields are shown (uses 'column' above)
        #
        #   OR – per-field column assignment using the field name as the key:
        #   fieldA = col1, col2       – fieldA gets two columns (e.g. min and max)
        #   fieldB = avg              – fieldB gets one column
        #   When any field-name key is present the 'values'/'column' keys in that
        #   subsection are ignored; only the explicitly listed fields are shown.
        #
        # Example – simple, same column on every page:
        # [[[customChart1]]]
        #     title     = My Chart
        #     charttype = area
        #     column    = avg
        #     values    = outTemp, inTemp
        #
        # Example – per-page and per-field column control:
        # [[[customChartOutTemp]]]
        #     title     = Outdoor Temperature
        #     charttype = area
        #     tick_style = align             # x-axis ticks for this chart, every page
        #     values    = outTemp, dewpoint   # default (current + pages without a subsection)
        #     column    = avg                 # default
        #     [[[[week]]]]
        #         tick_style = align:8       # ...but ask for ~8 ticks on the week page only
        #         outTemp  = min, max         # outTemp → "Outside Temperature Min" + "… Max"
        #         dewpoint = avg              # dewpoint → "Dew Point"  (no suffix for single col)
        #     [[[[year]]]]
        #         outTemp  = min, avg, max
        [[[customChartOutTemp]]]
            title = Outdoor Temperature
            charttype = area
            column = avg
            values = outTemp, dewpoint
            [[[[week]]]]
                outTemp  = min, max
                dewpoint = avg
            [[[[month]]]]
                outTemp  = min, max
                dewpoint = avg
            [[[[year]]]]
                outTemp  = min, max
                dewpoint = avg

        [[[customChartInTemp]]]
            title = Indoor Temperature
            charttype = area
            column = avg
            values = inTemp, inDewpoint
            [[[[week]]]]
                inTemp  = min, max
                inDewpoint = avg
            [[[[month]]]]
                inTemp  = min, max
                inDewpoint = avg
            [[[[year]]]]
                inTemp  = min, max
                inDewpoint = avg

       [[[customChartRadiation]]]
            title = Radiation and UV multi axis
            charttype = area
            column = avg
            values = UV, radiation
            # Multi-axis configuration: UV and radiation have different scales
            # UV typically ranges 0-15, radiation 0-1000+ W/m²
            [[[[yaxis]]]]
                UV = y1
                radiation = y2
            [[[[yaxis_config]]]]
                [[[[[y1]]]]]
                    title = UV Index
                    opposite = false
                [[[[[y2]]]]]
                    title = Solar Radiation (W/m²)
                    opposite = true
        [[[customChartBarometer]]]
             title = All Barometer Sensors
             charttype = area
             column = avg
             values = barometer, altimeter, pressure
        [[[customChartTemp]]]
            title = Temperature
            charttype = area
            column = avg
            values = inTemp, outTemp, inDewpoint, dewpoint



    # Embedded iFrames and images
    # -------------------------------------------------------------------------
    # Here you can add your own iFrames or images to be displayed as cards on the "current" page.
    # Section names must start with iFrame or image and must be unique. Doesn't need to be numbered.
    # Feel free to use any name like iFrameMyWebsite or imageMyLogo, just keep it same in the embedded_order list above.
    #
    [[Embedded]]
        [[[iFrame1]]]
            # URL of the website to be embedded in iframe
            url = "https://put_your_url_here.example/"
            # Optional title of card
            title = My iFrame 1
            # Optional aspect ratio of card, e.g. 4/3, 16/9, 1/1 to keep correct proportions, default is 4/3
            aspect_ratio = "4/3"

        [[[iFrame2]]]
            url = "https://put_your_url_here.example/"
            title = My iFrame 2
            aspect_ratio = "4/3"

        [[[image1]]]
            # URL of the image to be embedded as img tag
            url = "https://put_your_url_here.example/path_to_image.png"
            # Optional title of card
            title = My image 1
            # Aspect ratio of card, e.g. 4/3, 16/9, 1/1 to keep correct proportions, default is 4/3
            aspect_ratio = "4/3"
            # Optional alternative text for the image for better accessibility, default is "Image"
            alt = Image
            # Optional link url when image is clicked
            link = "https://put_your_url_here.example/"
            # Optional parameter to open link in new tab yes/no, default is no
            new_tab = no
            # Optional parameter to add padding around image yes/no, default is no
            padding = no

        [[[image2]]]
            url = "https://put_your_url_here.example/path_to_image.png"
            title = My image 2
            aspect_ratio = "4/3"
            alt = Image
            link = "https://put_your_url_here.example/"
            new_tab = no
            padding = no

    # Forecast behavior
    # -------------------------------------------------------------------------
    # Here you can change forecast behavior
    #
    [[Forecast]]
        # Forecast is provided by website https://open-meteo.com, all data available are under Attribution 4.0 International (CC BY 4.0) (https://creativecommons.org/licenses/by/4.0/)
        # By enabling forecast you must agree to Terms of use for Non-Commercial Use only. You can read full condition on website https://open-meteo.com/en/terms Please read more in Open Meteo terms of use.

        # The forecast externsion takes the current coordinates of your station which are defind in weewx.conf station section and fetches forecast data for these coordinates from Open Meteo API.

        # IMPORTANT, READ BEFORE ENABLING FORECAST:
        # After installing skin you need to restart weewx service to make it work

        # To enable forecast add lowercase "forecast" without quotes to the values_order list above in the [[Appearance]] section

        # Coordinate override (optional)
        # By default, coordinates from weewx.conf [Station] section are used
        # If you want to use different coordinates for the forecast, specify them here
        # format: xx.xxx with 3 digits after comma, e.g. latitude = 51.178 and longitude = -1.826 for Stonehenge, UK
        # Leave empty to use station coordinates from weewx.conf
        latitude =
        longitude =

        # Timezone from list of database time zones, or auto will determine timezone from station coordinates
        timezone = auto

        # Forecast variables to display inside forecast cards, supported variables are: temperature, evapotranspiration, uv, sun, uv-sun, precipitation, wind
        variables = temperature, precipitation, wind, sun

        # Display weather icon yes/no
        show_icon = yes

        # Display forecast description yes/no
        show_description = yes

        # Number of days to show in forecast, min 1 and max 7
        days = 3

        # Model to use, by default "best_match" is used. For more options see https://open-meteo.com/en/docs only one model can be used at a time.
        model = best_match

        # Render separator between current weather and forecast yes/no
        forecast_separator = no

        # Show words "Today" and "Tomorrow" instead of weekday names yes/no
        show_today_tomorrow = no

        # Show hourly weather icons at bottom of cards yes/no
        show_hourly_icons = no

        # Hourly icons aggregation interval in hours, used only if show_hourly_icons is yes, possible values are 1, 3, 6
        hourly_icons_interval = 3

        # Apply weigh to weather codes when aggregating daily icon / description from hourly icons yes/no
        # This will give more importance to worse weather codes when calculating daily icon / description from hourly data.
        apply_weather_code_weights = yes

    # Telemetry behavior
    # -------------------------------------------------------------------------
    # Here you can change telemetry behavior
    #
    [[Telemetry]]
        # This will allow to display telemetry plots and cards if value is zero, it is required as some stations report 1 or 0 only.  yes/no
        allow_zero_values = no

        # Number of days to show in telemetry charts (default: 30)
        # Increase this to see historical battery trends
        chart_days = 30

        # Default interval between chart data points in seconds (default: 300)
        # Can be overridden per field in [[[FieldConfiguration]]] or [[[BatteryFields]]]
        # Priority: FieldConfiguration.<field>.chart_interval > BatteryFields.<field>.chart_interval > default_interval
        default_interval = 300

        [[[BatteryFields]]]
            # Check out how to configure this feature from battery-config-guide.md
            # Example: Outside Temperature Battery
            # Uncomment and configure only if this sensor exists on your station

            # Example: Outside Temperature Battery Status (Bresser 5in1 RTL-SDR)
            #[[[[outTempBatteryStatus]]]]
            #    enabled = yes
            #    # Map raw values to text labels
            #    0 = OK
            #    1 = Low
            #    # Chart positions (higher = top of chart)
            #    chart_position_0 = 1
            #    chart_position_1 = 0
            #    max_chart_position = 1
            #    # Flip chart display (yes/no)
            #    flip_values = no
            #    chart_interval = 3600

        [[[FieldConfiguration]]]
            # Per-field chart configuration
            # chart_interval can also be set directly inside [[[BatteryFields]]] per field.
            # Priority: FieldConfiguration > BatteryFields > default (300 seconds)
            #
            # Example:
            #[[[[outTempBatteryStatus]]]]
            #    chart_interval = 300

    # Charts
    # -------------------------------------------------------------------------
    # Configuration of the charts / graphs
    #
    [[Charts]]
        # Color palette of charts
        # ---------------------------------------------------------------------
        #
        # There are 10 built in color palettes for the charts
        # You can use them as palette1 - palette10
        # See: https://apexcharts.com/docs/options/theme/#palette
        #
        palette = palette1

        # Height of charts in px
        height = 300

        # Stroke settings
        # ---------------------------------------------------------------------
        #
        # The curve of line / area charts can be:
        # smooth - connects points in a curve fashion (spline) (default)
        # straight - connects points in straight lines
        # stepline - connects points by horizontal and vertical lines
        #
        # The width of the curve is set in px. Default: 2
        #
        # The size of markers is set in px (dot on each datapoint).
        # Set to 0 to disable markers and only show the line. Default: 0
        #
        stroke_curve = smooth
        stroke_width = 2
        markers_size = 0

        # X-axis labels (the date/time marks along the bottom of each chart)
        # ---------------------------------------------------------------------
        #
        # These settings decide how many date/time labels appear along the
        # bottom of a chart and how they line up. Pick whichever style you
        # prefer - there are three:
        #
        #   auto            Let the chart decide how many labels to show based
        #                   on how wide it is. Simple, but the labels won't
        #                   necessarily land on tidy points like midnight or the
        #                   start of a month - they just get spread out evenly
        #                   from the first reading. Good enough for most charts.
        #
        #   fixed:N         Always show the same number of labels - N of them,
        #     (or just N)   evenly spaced (e.g. fixed:8 gives 8 evenly-spaced
        #                   labels). Use this when you want every chart to look
        #                   consistent regardless of its time range. Because the
        #                   labels are evenly spaced rather than snapped to the
        #                   calendar, on a week chart a weekday name can show up
        #                   twice. "fixed:6" and "fixed:8" are just examples -
        #                   use any number you like.
        #
        #   align           Line the labels up with the calendar - the neatest
        #   align:N         looking option. The chart figures out the right
        #                   spacing on its own:
        #                     - Short charts (up to ~2 days, e.g. the day page)
        #                       put the labels on the hour, e.g. 14:00, 16:00.
        #                     - Medium charts (week, month, and telemetry at its
        #                       default span) put a label on each day at midnight,
        #                       so they line up with the bars.
        #                     - Long charts (year) space the labels out roughly
        #                       once a month, ending on today.
        #                   (The tier is chosen from the chart's actual time span,
        #                   so telemetry follows Telemetry.chart_days - up to ~2
        #                   days it goes hourly, beyond that daily.)
        #                   Plain "align" lets it choose how many labels to show.
        #                   It aims for a tidy count but the calendar caps it, so
        #                   in practice: ~6 on the day page, one per day on the
        #                   week (~7-8), ~11 on the month, and 12 on the year.
        #                   Add a number - align:8 - to ask for about that many.
        #                   It's an approximate target: on very wide ranges a few
        #                   labels may be hidden if they'd overlap, so if you want
        #                   them all to show, ask for a slightly smaller number.
        #
        # How the per-page settings work:
        #   - "tick_style" is the overall default used everywhere.
        #   - The "tick_style_<page>" lines below override it for one page.
        #   - Leave a page line out (or comment it) and that page falls back to
        #     "tick_style", and if that's missing too, to "auto".
        #
        # The pages are: day (the front page and yesterday), week, month, year
        # (including older archived years), and telemetry. Telemetry uses the
        # same time range as its charts (Telemetry.chart_days, 30 days by
        # default - so with align it lands on the daily/midnight tier) and
        # applies the setting to every chart on that page.
        #
        # Note: the front page and yesterday share the one page key "day", so a
        # single tick_style_day covers both - there is no tick_style_yesterday.
        # (Per-CHART overrides can still target them separately via the
        # [[[[current]]]] and [[[[yesterday]]]] subsections - see [[Appearance]].)
        #
        # Examples:
        #   # Six labels on the day page, evenly spaced from the first reading to the last
        #   tick_style_day = fixed:6
        #   # Labels on the week page line up with the days of the week
        #   tick_style_week = align
        #   # About four labels on the month page, lined up with the calendar
        #   tick_style_month = align:4
        #   # About twelve labels on the year page, lined up with the calendar (may not be
        #   # on exact same date due to months having different lengths)
        #   tick_style_year = align
        #   # Telemetry charts (30 days by default) get labels based on chart width, not necessarily on tidy points
        #   tick_style_telemetry = auto

        # Set the default to 'align'.  The previous default was 'fixed:8' so if you want the previous behavior
        # you can set this back to this setting. If this section is removed, the ticks will revert back to 'auto'
        # and apex charts will determine the tick mark locations.  You can set these individually for each page 
        # if desired.
        # 
        #   tick_style_day = 
        #   tick_style_week = auto
        #   tick_style_month = align:4
        #   tick_style_year = align
        #   tick_style_telemetry = fixed:6
        tick_style = align

        # Timespans between each data point
        # ---------------------------------------------------------------------
        #
        # Here you define the timespans between each data     +---------------+
        # point for each template. Setting a too short        |  All values   |
        # timespan will result in charts with many            |  in seconds   |
        # data points which will  decrease performance.       |               |
        #                                                     |  600 = 10 min |
        # The XX_timespan value is for all charts except rain |  3600 = 1 hr  |
        # The XX_rain_timespan is the timespan for each bar   | 14400 = 4 hrs |
        #                                                     | 21600 = 6 hrs |
        # Year + month _archive_ templates will               | 86400 = 1 day |
        # always have a 1 day timespan for each data point.   +---------------+
        #

        # Current / Yesterday
        current_timespan = 600
        current_rain_timespan = 3600

        # Week
        week_timespan = 14400
        week_rain_timespan = 21600
        week_ET_timespan = 86400
        week_windrun_timespan = 86400

        # Month (only current month!)
        month_timespan = 21600
        month_rain_timespan = 86400
        month_ET_timespan = 86400
        month_windrun_timespan = 86400

        # Year (only current year! 604800 = 1 week)
        year_timespan = 86400
        year_rain_timespan = 604800
        year_ET_timespan = 86400
        year_windrun_timespan = 86400

        # Custom chart titles
        # Here you can override the default title of a chart.
        # By default it's the label name of the first data of a chart.
        # Key is always the name of the chart.
        # Just uncomment this and add charts to this list.
        #
        #   [[[Titles]]]
        #       outTemp = "Outside Temperatures"
        #       windchill = "Apparent Temperatures"
        #
        # Translations
        # Feel free to add your own or adjust the values.
        # We robots sometimes no good at translating. Beep Boop.
        #
        # Do your translation in the corresponing .conf file in the /lang directory
        #    [[Translations]]
        #
        #        [[[<country>]]]

    [[MQTT]]
        # Enable/Disable MQTT functionality (default: false)
        # Set to true to enable MQTT connection and status display
        enabled = false

        # Enable/Disable debug logging (default: false)
        # Set to true for verbose console output
        debug = false

        # Enable/Disable flash animation on value update (default: true)
        # Set to false to disable flash effect when values change via MQTT
        flash_on_update = true

        # Flash color for value updates (default: "#00ff00" = green)
        # Hex color code for the flash animation when values update
        # Note: Due to config file parsing, hex colors should be in quotes like other colors in this file
        # If you don't use quotes, the # character starts a comment and the value becomes empty
        flash_color = "#D73A4A"

        # MQTT message format (default: json)
        # Supported values: json, ecowitt
        # Use "ecowitt" if your station sends raw Ecowitt HTTP POST payloads
        # (e.g. PASSKEY=...&tempf=38.12&humidity=81&...)
        # The ecowitt parser will convert field names and units to weewx format automatically.
        message_format = json

        # MQTT message timestamp field (default: dateTime)
        # Specify the field name in the MQTT payload that contains the timestamp
        # This field is used to check if incoming data is newer than current data
        message_timestamp_field = dateTime

        # Skip timestamp check (default: false)
        # Set to true to skip checking if incoming data is newer than current data
        # When enabled, all incoming MQTT messages will update the display regardless of timestamp
        skip_timestamp_check = false

        # This is the library source, usually stays as is
        paho_mqtt_url = https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.1.0/paho-mqtt.min.js

        # Use the domain name only, no 'http://' prefix for the host variable
        # host = <your_mqtt_broker_domain_or_ip>
        # port = 9001
        # topic = "weewx/#"
        host =
        port = 9001
        topic = "weewx/#"

        # --- CRITICAL CHANGES ---
        use_ssl = true
        use_websocket = true
        # ------------------------
        websocket_path = /mqtt
        username =
        password =

        # Sensor mapping configuration (CSV format with quoted values)
        # Format: sensor_name = "payload_attr", "unit", decimals
        [[[SensorMapping]]]
            altimeter = "altimeter_mbar", " mbar", 1
            appTemp = "appTemp_C", "°C", 1
            barometer = "barometer_mbar", " mbar", 1
            cloudbase = "cloudbase_meter", " m", 0
            dewpoint = "dewpoint_C", "°C", 1
            ET = "dayET", " in", 2
            extraHumid1 = "extraHumid1", "%", 0
            extraHumid2 = "extraHumid2", "%", 0
            extraHumid3 = "extraHumid3", "%", 0
            extraHumid4 = "extraHumid4", "%", 0
            extraTemp1 = "extraTemp1_C", "°C", 1
            extraTemp2 = "extraTemp2_C", "°C", 1
            extraTemp3 = "extraTemp3_C", "°C", 1
            extraTemp4 = "extraTemp4_C", "°C", 1
            heatindex = "heatindex_C", "°C", 1
            inHumidity = "inHumidity", "%", 0
            inTemp = "inTemp_C", "°C", 1
            outHumidity = "outHumidity", "%", 0
            outTemp = "outTemp_C", "°C", 1
            pressure = "pressure_mbar", " mbar", 1
            radiation = "radiation_Wpm2", " W/m²", 1
            rain = "dayRain_cm", " mm", 1
            rainRate = "rainRate_cm_per_hour", " mm/h", 2
            UV = "UV", "", 1
            windDir = "windDir", "°", 0
            windGust = "windGust_kph", " km/h", 1
            windSpeed = "windSpeed_kph", " km/h", 0
            windchill = "windchill_C", "°C", 1
            # --- Fields added for Ecowitt message_format support ---
            consBatteryVoltage = "consBatteryVoltage_volt", " V", 2
            outTempBatteryStatus = "outTempBatteryStatus", " V", 1
            extraBattery1 = "extraBattery1", "", 0
            extraBattery2 = "extraBattery2", "", 0
            extraBattery3 = "extraBattery3", "", 0
            extraBattery4 = "extraBattery4", "", 0
            inDewpoint = "inDewpoint_C", "°C", 1
            humidex = "humidex_C", "°C", 1


# Cheetah templating engine configuration
# -------------------------------------------------------------------------
#

[CheetahGenerator]
    search_list_extensions = user.historygenerator.MyXSearch, user.openmeteo.Forecast, user.updatecheck.UpdateCheck, user.onlinecheck.OnlineCheck

    # Possible encodings are 'html_entities', 'utf8', or 'strict_ascii'
    encoding = utf8

    [[SummaryByMonth]]
        # Reports which summarize by month
        [[[month_summary]]]
            template = month-%Y-%m.html.tmpl

        [[[month_NOAA]]]
            encoding = utf8
            template = archive/NOAA-%Y-%m.txt.tmpl

    [[SummaryByYear]]
        # Reports which summarize by year
        [[[year_summary]]]
            stale_age = 86400
            template = year-%Y.html.tmpl

        [[[year_NOAA]]]
            encoding = utf8
            template = archive/NOAA-%Y.txt.tmpl

    [[ToDate]]
        # Reports which show statistics (e.g. day) to date
        [[[day]]]
            template = index.html.tmpl

        [[[yesterday]]]
            template = yesterday.html.tmpl

        [[[week]]]
            template = week.html.tmpl

        [[[month]]]
            template = month.html.tmpl

        [[[year]]]
            stale_age = 86400
            template = year.html.tmpl

        [[[archive]]]
            template = archive.html.tmpl

        [[[almanac]]]
            template = almanac.html.tmpl

        [[[telemetry]]]
            template = telemetry.html.tmpl

        [[[history]]]
            template = history.html.tmpl

    [[Global]]
        template = manifest.json.tmpl

# File copy configuration
# -----------------------------------------------------------------------------
#
# This section describes all files which should be copied
#
[CopyGenerator]
    # List of files to be copied each run (except templates)
    # css/*, js/*, weather-icons/* are copied on every run so skin updates propagate automatically
    copy_always = css/*, js/*, weather-icons/*
    # img/* and fonts/* are copied only once (user may customise icons/fonts)
    copy_once = img/*, fonts/*

# HistoryReport
# -------------------------------------------------------------------------
#
[HistoryReport]
    # Thresholds for temperature based summary tables
    threshold_unit = "degree_C"
    summer_days_threshold = 25.0
    tropical_days_threshold = 30.0
    tropical_nights_threshold = 20.0
    arctic_days_threshold = 0.0
    # Settings for the HTML month/year colour coded summary table generator

    # minvalues, maxvalues and colours should contain the same number of elements.
    # For example,  the [min_temp] example below, if the minimum temperature measured in
    # a month is between -50 and -10 (degC) then the cell will be shaded in html colour code #3055ff.
    # Default is temperature scale
    minvalues = -50, -10, -5, 0, 5, 10, 15, 20, 25, 30, 35
    maxvalues = -10, -5, 0, 5, 10, 15, 20, 25, 30, 35, 60
    colours = "#3055ff", "#0186e7", "#02e3ea", "#5ef3d2", "#04ec97", "#2bf207", "#8af408", "#e9f70a", "#f9a90b", "#fc4d0d", "#ff0f2d"
    monthnames = Jan, Feb, Mar, Apr, May, Jun, Jul, Aug, Sep, Oct, Nov, Dec
    summary_column = False
    summary_heading = All

    # The Raspberry Pi typically takes 15+ seconds to calculate all the summaries with a few years of weather date.
    # refresh_interval is how often in minutes the tables are calculated.
    refresh_interval = 60

    [[min_temp]]
        obs_type = outTemp                 # obs_type can be any weewx reading
        # Can also use these aggregate_types:  'max_ge', 'max_le', 'min_le', 'sum_ge' to count days
        # where an observation is ge: greater of equalto, or le: lessthan or equal to a threshold value
        # To specify this threshold, use: aggregate_threshold = [value], [units]
        # e.g Specify temperature threshold of 20C:  aggregate_threshold = 20, degree_C
        aggregate_type = min               # Any of these: 'sum', 'count', 'avg', 'max', 'min'

    [[max_temp]]
        obs_type = outTemp
        aggregate_type = max

    [[avg_temp]]
        obs_type = outTemp
        aggregate_type = avg

    [[arctic_days]]
        obs_type = outTemp
        units = Days                        # Override default table units label
        aggregate_type = max_le
        aggregate_threshold = %(arctic_days_threshold)s, %(threshold_unit)s
        minvalues = -10, 1,  8, 12, 20   # Override default temperature colour scheme with rain specific scale
        maxvalues = 0, 8, 12, 20, 32
        colours = "#f8f9fa", "#2bf207", "#04ec97", "#5ef3d2", "#02e3ea",

    [[summer_days]]
        obs_type = outTemp
        units = Days                        # Override default table units label
        aggregate_type = max_ge
        aggregate_threshold = %(summer_days_threshold)s, %(threshold_unit)s
        minvalues = -10, 1,  8, 12, 20   # Override default temperature colour scheme with rain specific scale
        maxvalues = 0, 8, 12, 20, 32
        colours = "#f8f9fa", "#e9f70a", "#f9a90b", "#fc4d0d", "#ff0f2d"

    [[tropical_days]]
        obs_type = outTemp
        units = Days                        # Override default table units label
        aggregate_type = max_ge
        aggregate_threshold = %(tropical_days_threshold)s, %(threshold_unit)s
        minvalues = -10, 1,  8, 12, 20   # Override default temperature colour scheme with rain specific scale
        maxvalues = 0, 8, 12, 20, 32
        colours = "#f8f9fa", "#f9a90b", "#fc4d0d", "#ff0f2d", "#dc3545"

    [[tropical_nights]]
        obs_type = outTemp
        units = Days                        # Override default table units label
        aggregate_type = min_ge
        aggregate_threshold = %(tropical_nights_threshold)s, %(threshold_unit)s
        minvalues = -10, 1,  8, 12, 20   # Override default temperature colour scheme with rain specific scale
        maxvalues = 0, 8, 12, 20, 32
        colours = "#f8f9fa", "#f9a90b", "#fc4d0d", "#ff0f2d", "#dc3545"

    [[rain]]
        obs_type = rain
        aggregate_type = sum
        minvalues = 0, 25, 50, 75, 100, 150   # Override default temperature colour scheme with rain specific scale
        maxvalues = 25, 50, 75, 100, 150, 1000
        colours = "#e9f2f7", "#d2e6ef", "#a5cddf", "#78b3d0", "#4b9ac0", "#1e81b0"

    [[rain_days]]
        obs_type = rain
        units = Days                        # Override default table units label
        aggregate_type = sum_ge             # https://de.wikipedia.org/wiki/Regentag
        aggregate_threshold = 0.1, mm
        minvalues = 0,  5, 10, 15, 20, 25   # Override default temperature colour scheme with rain specific scale
        maxvalues = 5, 10, 15, 20, 25, 50
        colours = "#e9f2f7", "#d2e6ef", "#a5cddf", "#78b3d0", "#4b9ac0", "#1e81b0"

    [[uv_max]]
        obs_type = UV
        aggregate_type = max
        minvalues = 0, 2, 4, 6,  8, 10, 12, 15
        maxvalues = 2, 4, 6, 8, 10, 12, 15, 50
        colours = "#5ef3d2", "#04ec97", "#2bf207", "#8af408", "#e9f70a", "#f9a90b", "#fc4d0d", "#ff0f2d"

    [[max_wind]]
        obs_type = wind
        aggregate_type = max
        minvalues = 0, 20, 30, 35, 40, 45, 50, 55, 60,  80
        maxvalues = 20, 30, 35, 40, 45, 50, 55, 60, 80, 200
        colours = "#f6e8f5", "#edd1eb", "#e4bae1", "#dba3d7", "#d38ccd", "#ca75c2", "#c15eb8", "#b847ae", "#af30a4", "#a6199a"

    [[avg_wind]]
        obs_type = wind
        aggregate_type = avg
        minvalues = 0, 1, 2, 3, 4,   5
        maxvalues = 1, 2, 3, 4, 5, 200
        colours = "#f6e8f5", "#edd1eb", "#e4bae1", "#dba3d7", "#d38ccd", "#ca75c2"

    [[lightning_strike_count]]
        obs_type = lightning_strike_count
        units = Strikes
        aggregate_type = sum
        minvalues = 0, 50, 100, 200, 300, 500
        maxvalues = 50, 500, 1000, 2000, 3000, 5000
        colours = "#f6e8f5", "#dba3d7", "#c15eb8", "#a6199a", "#800080", "#4b004b"

# Generators
# -------------------------------------------------------------------------
# This section describes all generators mentioned above
#
[Generators]
    generator_list = weewx.cheetahgenerator.CheetahGenerator, weewx.reportengine.CopyGenerator


[Labels]
    [[Generic]]
        # Here you can override any label in the skin by defining it here with the same name as in the template files.
        # For example, to change the label of the outside temperature card, you can add:
        # outTemp = "Outside Temperature"
        unused = unused
