# Multi-Axis Test Configuration
# Copy these examples to your skin.conf [[Appearance]] section to test multi-axis charts

# Test 1: UV and Solar Radiation (Two Axes)
# ============================================
# UV typically ranges 0-15, Radiation 0-1000+ W/m²
# Perfect test case for multi-axis
[[[customChartTest1_UVRadiation]]]
    title = Test 1: UV & Radiation (2 Axes)
    charttype = area
    column = avg
    values = UV, radiation

    # Assign fields to axes
    [[[[yaxis]]]]
        UV = y1
        radiation = y2

    # Configure each axis
    [[[[yaxis_config]]]]
        [[[[[y1]]]]]
            title = UV Index
            opposite = false
            decimals = 1
            min = 0
            max = 15
        [[[[[y2]]]]]
            title = Solar Radiation (W/m²)
            opposite = true
            decimals = 0

# Test 2: Temperature and Humidity (Two Axes)
# ============================================
# Common use case: different units and scales
[[[customChartTest2_TempHumid]]]
    title = Test 2: Temperature & Humidity (2 Axes)
    charttype = area
    column = avg
    values = outTemp, outHumidity

    [[[[yaxis]]]]
        outTemp = y1
        outHumidity = y2

    [[[[yaxis_config]]]]
        [[[[[y1]]]]]
            title = Temperature (°C)
            opposite = false
            decimals = 1
        [[[[[y2]]]]]
            title = Humidity (%)
            opposite = true
            decimals = 0
            min = 0
            max = 100

# Test 3: Multiple Fields on Same Axis (Two Axes)
# ================================================
# Three temperature fields on y1, pressure on y2
[[[customChartTest3_MultiField]]]
    title = Test 3: 3 Temps + Pressure (2 Axes)
    charttype = area
    column = avg
    values = outTemp, inTemp, dewpoint, barometer

    [[[[yaxis]]]]
        outTemp = y1
        inTemp = y1
        dewpoint = y1
        barometer = y2

    [[[[yaxis_config]]]]
        [[[[[y1]]]]]
            title = Temperature (°C)
            opposite = false
        [[[[[y2]]]]]
            title = Pressure (mbar)
            opposite = true

# Test 4: Three Axes
# ===================
# Advanced: Three different measurement types
[[[customChartTest4_ThreeAxes]]]
    title = Test 4: Temp, Humidity & Pressure (3 Axes)
    charttype = line
    column = avg
    values = outTemp, outHumidity, barometer

    [[[[yaxis]]]]
        outTemp = y1
        outHumidity = y2
        barometer = y3

    [[[[yaxis_config]]]]
        [[[[[y1]]]]]
            title = Temperature (°C)
            opposite = false
            decimals = 1
        [[[[[y2]]]]]
            title = Humidity (%)
            opposite = true
            decimals = 0
        [[[[[y3]]]]]
            title = Pressure (mbar)
            opposite = true
            decimals = 1

# Test 5: Backward Compatibility (Single Axis)
# =============================================
# No multi-axis config = should work like before
[[[customChartTest5_SingleAxis]]]
    title = Test 5: Single Axis (Backward Compat)
    charttype = area
    column = avg
    values = outTemp, inTemp, dewpoint
    # No yaxis config = all on y1 automatically

# Test 6: Wind Speed & Direction
# ===============================
# Wind speed (km/h or mph) vs direction (degrees)
# NOTE: Wind direction typically uses radar chart, but this shows multi-axis works
[[[customChartTest6_Wind]]]
    title = Test 6: Wind Speed & Direction (2 Axes)
    charttype = line
    values = windSpeed, windDir
    column = avg

    [[[[yaxis]]]]
        windSpeed = y1
        windDir = y2

    [[[[yaxis_config]]]]
        [[[[[y1]]]]]
            title = Wind Speed
            opposite = false
        [[[[[y2]]]]]
            title = Wind Direction (°)
            opposite = true
            min = 0
            max = 360

# Test 7: Rain and ET (Bar Chart)
# ================================
# Shows multi-axis works with bar charts too
[[[customChartTest7_RainET]]]
    title = Test 7: Rain & ET (Bar, 2 Axes)
    charttype = bar
    column = sum
    values = rain, ET

    [[[[yaxis]]]]
        rain = y1
        ET = y2

    [[[[yaxis_config]]]]
        [[[[[y1]]]]]
            title = Rainfall
            opposite = false
        [[[[[y2]]]]]
            title = Evapotranspiration
            opposite = true

# ==============================================================================
# USAGE INSTRUCTIONS
# ==============================================================================
#
# 1. Copy ONE of the test examples above to your skin.conf file
# 2. Add it inside the [[Appearance]] section
# 3. Add the chart name to the charts_order list, for example:
#    charts_order = customChartTest1_UVRadiation, customChart1, ...
#
# 4. Restart WeeWX
# 5. Navigate to the Yesterday page
# 6. You should see your multi-axis chart!
#
# TROUBLESHOOTING:
# - If chart doesn't appear: Check that you have data for those sensors
# - If axes look wrong: Verify indentation (4 spaces per level)
# - If errors in logs: Check field names match your database
#
# TESTING CHECKLIST:
# [ ] Test 1: UV & Radiation - Different scales (small vs large)
# [ ] Test 2: Temp & Humidity - Different units
# [ ] Test 3: Multiple fields per axis
# [ ] Test 4: Three axes
# [ ] Test 5: Backward compatibility (no config)
# [ ] Test 6: Different chart type (line)
# [ ] Test 7: Bar chart with multi-axis
#
# ==============================================================================

